name: Nightly Improve Loop

on:
  schedule:
    # Run at 3 AM UTC every night
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      supply_sources:
        description: 'Scenario supply sources (comma-separated: fuzz,harvest,receipts)'
        required: false
        default: 'fuzz'
      llm_provider:
        description: 'LLM provider for improve (gemini, claude, anthropic, none)'
        required: false
        default: 'gemini'
      families:
        description: 'Scenario families to test (comma-separated, or empty for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (triage + generate, no apply)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  BUN_VERSION: '1.2.2'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Supply — Generate new scenario fuel
  # ─────────────────────────────────────────────────────────────
  supply:
    name: Scenario Supply Chain
    runs-on: ubuntu-latest
    outputs:
      new_scenarios: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fixture fuzzer
        if: contains(github.event.inputs.supply_sources || 'fuzz', 'fuzz')
        run: bun run scripts/supply/fuzz.ts --max-variants=50

      - name: Run external corpus harvester
        if: contains(github.event.inputs.supply_sources || '', 'harvest')
        run: bun run scripts/supply/harvest.ts --max-scenarios=100

      - name: Run receipt scraper
        if: contains(github.event.inputs.supply_sources || '', 'receipts')
        run: bun run scripts/supply/scrape-receipts.ts
        env:
          RECEIPTS_PATH: ${{ secrets.RECEIPTS_PATH }}

      - name: Count new scenarios
        id: count
        run: |
          COUNT=$(bun run scripts/supply/count-new.ts 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload supply artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-scenarios
          path: |
            fixtures/scenarios/
            data/supply-log.jsonl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Baseline — Run self-test to find current failures
  # ─────────────────────────────────────────────────────────────
  baseline:
    name: Baseline Self-Test
    needs: supply
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      failing_count: ${{ steps.baseline.outputs.failing }}
      total_count: ${{ steps.baseline.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download supply scenarios
        uses: actions/download-artifact@v4
        with:
          name: supply-scenarios
          path: .

      - name: Run baseline self-test
        id: baseline
        run: |
          bun run src/cli.ts self-test --ledger-path=data/nightly-baseline.jsonl 2>&1 | tee baseline-output.txt || true
          FAILING=$(grep -c '"clean":false' data/nightly-baseline.jsonl 2>/dev/null || echo "0")
          TOTAL=$(wc -l < data/nightly-baseline.jsonl 2>/dev/null || echo "0")
          echo "failing=$FAILING" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "::notice::Baseline: $FAILING failing out of $TOTAL scenarios"

      - name: Upload baseline ledger
        uses: actions/upload-artifact@v4
        with:
          name: baseline-ledger
          path: data/nightly-baseline.jsonl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Improve — Fix failures automatically
  # ─────────────────────────────────────────────────────────────
  improve:
    name: Improve Loop
    needs: baseline
    if: needs.baseline.outputs.failing_count != '0'
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.improve.outputs.verdict }}
      improvements: ${{ steps.improve.outputs.improvements }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download supply scenarios
        uses: actions/download-artifact@v4
        with:
          name: supply-scenarios
          path: .

      - name: Run improve loop
        id: improve
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LLM="${{ github.event.inputs.llm_provider || 'gemini' }}"
          FAMILIES="${{ github.event.inputs.families }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          ARGS="--llm=$LLM --max-candidates=3"
          if [ -n "$FAMILIES" ]; then
            ARGS="$ARGS --families=$FAMILIES"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          bun run src/cli.ts improve $ARGS 2>&1 | tee improve-output.txt || true

          # Parse verdict from output
          VERDICT=$(grep -oP 'VERDICT: \K\w+' improve-output.txt || echo "unknown")
          IMPROVEMENTS=$(grep -oP 'Improvements: \K\d+' improve-output.txt || echo "0")
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "improvements=$IMPROVEMENTS" >> $GITHUB_OUTPUT

      - name: Upload improve artifacts
        uses: actions/upload-artifact@v4
        with:
          name: improve-results
          path: |
            data/improve-history.json
            data/improvement-ledger.jsonl
            improve-output.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Stage 4: Validate — Run full self-test on improved code
  # ─────────────────────────────────────────────────────────────
  validate:
    name: Post-Improve Validation
    needs: improve
    if: needs.improve.outputs.verdict == 'accepted'
    runs-on: ubuntu-latest
    outputs:
      clean: ${{ steps.validate.outputs.clean }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full validation
        id: validate
        run: |
          bun run src/cli.ts self-test 2>&1 | tee validate-output.txt
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "clean=true" >> $GITHUB_OUTPUT
          else
            echo "clean=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────
  # Stage 5: Report — Create PR or issue with results
  # ─────────────────────────────────────────────────────────────
  report:
    name: Nightly Report
    needs: [supply, baseline, improve, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate nightly report
        id: report
        run: |
          DATE=$(date +%Y-%m-%d)
          SUPPLY="${{ needs.supply.outputs.new_scenarios || '0' }}"
          BASELINE_FAIL="${{ needs.baseline.outputs.failing_count || '0' }}"
          BASELINE_TOTAL="${{ needs.baseline.outputs.total_count || '0' }}"
          VERDICT="${{ needs.improve.outputs.verdict || 'skipped' }}"
          IMPROVEMENTS="${{ needs.improve.outputs.improvements || '0' }}"
          CLEAN="${{ needs.validate.outputs.clean || 'skipped' }}"

          cat > nightly-report.md << EOF
          ## Nightly Improve Report — $DATE

          | Stage | Result |
          |-------|--------|
          | Supply | $SUPPLY new scenarios |
          | Baseline | $BASELINE_FAIL failing / $BASELINE_TOTAL total |
          | Improve | Verdict: **$VERDICT** ($IMPROVEMENTS improvements) |
          | Validate | Clean: **$CLEAN** |

          ### Pipeline
          \`\`\`
          Supply ($SUPPLY new) → Baseline ($BASELINE_FAIL/$BASELINE_TOTAL) → Improve ($VERDICT) → Validate ($CLEAN)
          \`\`\`
          EOF

          # Determine if we should create a PR
          if [ "$VERDICT" = "accepted" ] && [ "$CLEAN" = "true" ]; then
            echo "action=pr" >> $GITHUB_OUTPUT
          else
            echo "action=issue" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for accepted improvements
        if: steps.report.outputs.action == 'pr'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "nightly: improve loop fixes (${{ needs.improve.outputs.improvements }} improvements)"
          body-path: nightly-report.md
          branch: nightly/improve-${{ github.run_number }}
          commit-message: "nightly: auto-improve from ${{ needs.improve.outputs.improvements }} fixes"

      - name: Create issue for failed/skipped runs
        if: steps.report.outputs.action == 'issue'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('nightly-report.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly improve report — ${date}`,
              body: body,
              labels: ['nightly', 'automated']
            });
