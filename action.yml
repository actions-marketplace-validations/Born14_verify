name: 'Verify'
description: 'Catches unsafe database migrations before they hit production. Deterministic. No LLM in the check path.'
author: 'Born14'

branding:
  icon: 'database'
  color: 'orange'

inputs:
  app-dir:
    description: 'Path to the application directory (default: repo root)'
    required: false
    default: '.'
  intent:
    description: 'Enable intent checking — extracts predicates from PR title/description (requires api-key)'
    required: false
    default: 'false'
  api-key:
    description: 'API key for intent-level predicate extraction. Works with any provider.'
    required: false
  provider:
    description: 'LLM provider for intent extraction: gemini (default), openai, anthropic'
    required: false
    default: 'gemini'
  staging:
    description: 'Enable Docker staging gate (builds and runs the app)'
    required: false
    default: 'false'
  fail-on:
    description: 'Which severity fails the check: "error" (default), "warning", or "none"'
    required: false
    default: 'error'
  comment:
    description: 'Post results as a PR comment (default: true)'
    required: false
    default: 'true'

outputs:
  success:
    description: 'Whether all checks passed (true/false)'
  gates-passed:
    description: 'Comma-separated list of passed check names'
  gates-failed:
    description: 'Comma-separated list of failed check names'
  summary:
    description: 'One-line summary of results'

runs:
  using: 'node20'
  main: 'dist/action/index.cjs'
