name: 'Verify by Born14'
description: 'Catches unsafe database migrations before they hit production. Deterministic. No LLM in the check path.'
author: 'Born14'

branding:
  icon: 'database'
  color: 'orange'

inputs:
  token:
    description: 'GitHub token with pull-requests: write and contents: read'
    required: false
    default: ${{ github.token }}
  fail-on:
    description: 'Which severity fails the check: "error" (default), "warning", or "none"'
    required: false
    default: 'error'
  comment:
    description: 'Post results as a PR comment (default: true)'
    required: false
    default: 'true'

outputs:
  success:
    description: 'Whether all checks passed (true/false)'
  summary:
    description: 'One-line summary of results'

runs:
  using: 'node24'
  main: 'dist/action/index.cjs'
